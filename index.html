<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge of Vision — Technical Art</title>
  <meta name="description" content="지각(perception)을 연구하는 테크니컬 아트 포트폴리오. 프로젝트와 공부 기록." />

  <!-- Jost(기하학적 디스플레이) / Pretendard(본문) / IBM Plex Mono(유틸) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== HERO ===================== -->
  <header class="hero" id="top">
    <canvas id="void-field" aria-hidden="true"></canvas>

    <nav class="nav">
      <a class="nav-logo" href="#top">EoV</a>
      <div class="nav-links">
        <a href="#projects">Projects</a>
        <a href="#study">Study</a>
      </div>
    </nav>

    <div class="hero-inner">
      <!--
        아나모픽 타이포그래피:
        글자 조각들이 서로 다른 평면에 놓여 있고,
        커서가 화면 정중앙에 올 때만 하나의 문장으로 정렬됩니다.
        (참조: Felice Varini 스타일의 시점 의존적 설치 타이포)
      -->
      <h1 class="ana" id="ana" aria-label="EDGE OF VISION">
        <span class="ana-line">
          <span class="ana-frag" data-p="-42,10,-90,-24">ED</span><span class="ana-frag" data-p="30,-14,60,18">GE</span>
          <span class="ana-frag ana-of" data-p="-18,26,-140,40">OF</span>
        </span>
        <span class="ana-line">
          <span class="ana-frag" data-p="24,18,-70,-30">VI</span><span class="ana-frag" data-p="-34,-8,50,26">SI</span><span class="ana-frag" data-p="46,14,-110,-14">ON</span>
        </span>
      </h1>

      <p class="hero-sub">지각을 렌더링하는 테크니컬 아트 — 몰입, 착시, 실시간 셰이더.</p>
      <p class="hero-hint mono" id="hint">커서를 화면 정중앙으로 — 시점이 맞으면 글자가 정렬됩니다</p>
    </div>

    <div class="hero-foot mono">
      <span>PERCEPTION-DRIVEN&nbsp;TECHNICAL&nbsp;ART</span>
      <span>INCHEON,&nbsp;KR</span>
    </div>
  </header>

  <main>
    <!-- ===================== PROJECTS ===================== -->
    <section class="section" id="projects">
      <header class="sec-head">
        <span class="sec-num" aria-hidden="true">01</span>
        <h2 class="sec-title">프로젝트</h2>
      </header>
      <ol class="index-list" id="projects-list"></ol>
    </section>

    <!-- ===================== STUDY ===================== -->
    <section class="section" id="study">
      <header class="sec-head">
        <span class="sec-num" aria-hidden="true">02</span>
        <h2 class="sec-title">공부한 내용</h2>
      </header>
      <ol class="index-list index-list-study" id="study-list"></ol>
    </section>
  </main>

  <footer class="footer">
    <p class="footer-line">시야의 가장자리에서.</p>
    <div class="footer-links mono">
      <a class="edit-me" href="https://github.com/YOUR_GITHUB_ID" target="_blank" rel="noopener">GitHub</a>
      <a class="edit-me" href="mailto:your@email.com">Email</a>
    </div>
    <span class="footer-copy mono">© 2026 Edge of Vision</span>
  </footer>

  <script src="data/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
